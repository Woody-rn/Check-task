services:
  scanner:
    image: ghcr.io/woody-rn/task-scanner:latest
    container_name: task-scanner-prod
    ports:
      - "7000:7000"
    restart: unless-stopped
    volumes:
      - ${HOST_SCAN_PATH:-./scan-data}:/data/scan
    networks:
      - check_task_network

networks:
  check_task_network:
    name: check_task_network
    driver: bridge