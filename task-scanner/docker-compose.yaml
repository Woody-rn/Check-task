services:
  scanner:
    build:
      context: ..
      dockerfile: ./task-scanner/Dockerfile
    image: task-scanner:local
    container_name: task-scanner-dev
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7000:7000"
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    container_name: task-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb_postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=ru_RU.UTF-8"
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d mydb_postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  liquibase:
    image: liquibase/liquibase:4.33-alpine
    container_name: task-liquibase
    user: root
    environment:
      - LIQUIBASE_SEARCH_PATH=/liquibase/changelog  # Добавьте это
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - --url=jdbc:postgresql://task-postgres:5432/mydb_postgres
      - --username=postgres
      - --password=postgres
      - --changeLogFile=changelog-master.yaml
      - update
    volumes:
      - ./liquibase/changelog:/liquibase/changelog