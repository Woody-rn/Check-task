databaseChangeLog:
  - changeSet:
      id: create-file-metadata-table
      author: nikitin ruslan

      changes:
        - createTable:
            tableName: file_metadata
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: sprint_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_file_metadata_sprint
                    references: sprint(id)
              - column:
                  name: task_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_file_metadata_task
                    references: task(id)
              - column:
                  name: fileName
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: s3Key
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: s3Url
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false