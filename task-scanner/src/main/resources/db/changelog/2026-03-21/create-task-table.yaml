databaseChangeLog:
  - changeSet:
      id: create-task-table
      author: nikitin ruslan

      changes:
        - createTable:
            tableName: task
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: sprint_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_task_sprint
                    references: sprint(id)
              - column:
                  name: number
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false